version: 2

updates:
    # npm dependencies at root
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
          day: monday
          time: '03:00'
      open-pull-requests-limit: 5
      pull-request-branch-name:
          separator: '/'
      reviewers:
          - 'lgates'
      labels:
          - 'dependencies'
          - 'javascript'
      commit-message:
          prefix: 'chore(deps)'
          prefix-develop: 'chore(deps)'
          include: 'scope'
      allow:
          - dependency-type: 'all'
      ignore:
          # Add any packages to ignore here if needed
      groups:
          minor-and-patch:
              dependency-types:
                  - 'minor'
                  - 'patch'
              update-types:
                  - 'minor'
                  - 'patch'
          major:
              dependency-types:
                  - 'major'
              update-types:
                  - 'major'

    # Rust/Cargo dependencies in server/ directory
    - package-ecosystem: cargo
      directory: '/server'
      schedule:
          interval: weekly
          day: monday
          time: '03:30'
      open-pull-requests-limit: 5
      pull-request-branch-name:
          separator: '/'
      reviewers:
          - 'lgates'
      labels:
          - 'dependencies'
          - 'rust'
      commit-message:
          prefix: 'chore(deps)'
          prefix-develop: 'chore(deps)'
          include: 'scope'
      allow:
          - dependency-type: 'all'
      groups:
          minor-and-patch:
              dependency-types:
                  - 'minor'
                  - 'patch'
              update-types:
                  - 'minor'
                  - 'patch'
          major:
              dependency-types:
                  - 'major'
              update-types:
                  - 'major'

    # GitHub Actions versions
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
          day: monday
          time: '04:00'
      open-pull-requests-limit: 5
      pull-request-branch-name:
          separator: '/'
      reviewers:
          - 'lgates'
      labels:
          - 'dependencies'
          - 'ci'
      commit-message:
          prefix: 'chore(ci)'
          prefix-develop: 'chore(ci)'
          include: 'scope'

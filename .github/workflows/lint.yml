name: Lint & Format

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint-format:
        name: Lint & Format Check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Biome
              uses: biomejs/setup-biome@v2

            - name: Run Biome check
              run: biome check .
